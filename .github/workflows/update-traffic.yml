name: 首都高交通情報の自動更新

on:
  schedule:
    # UTC基準。日本時間(JST)は UTC+9
    - cron: '30 1 * * *'   # JST 10:30ごろ（11時更新に備えて少し早めに実行→再実行される想定でも良いが、まずは1回)
    - cron: '15 8 * * *'   # JST 17:15ごろ
    - cron: '15 12 * * *'  # JST 21:15ごろ
  workflow_dispatch: {}   # 手動実行もできるようにしておく

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: Pythonをセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 必要なライブラリをインストール
        run: pip install requests beautifulsoup4 lxml

      - name: 交通情報を取得してページを生成
        run: python scripts/update_traffic.py

      - name: 変更があればコミット・反映
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add shutoko_hub.html
          if git diff --cached --quiet; then
            echo "変更なし。コミットをスキップします。"
          else
            git commit -m "自動更新: 首都高交通規制情報 ($(date '+%Y-%m-%d %H:%M'))"
            git push
          fi
